<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - Panel Administrador</title>
    <link rel="icon" href="../../../public/img/escudo_AAUCA.jpg">
    <link rel="stylesheet" href="../../../public/nomodules/fontawesome/node_modules/@fortawesome/fontawesome-free/css/all.min.css">
    <link rel="stylesheet" href="../../../public/nomodules/startbootstrap-sb-admin-2/css/sb-admin-2.min.css">
    <link rel="stylesheet" href="../../../public/nomodules/boostrap/node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../../public/template/css/globalModulos.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body id="page-top">
    <!-- Page Wrapper -->
    <div id="wrapper" class="toggled">
        <!-- Content Wrapper -->
        <div id="content-wrapper" class="d-flex flex-column">
            <!-- Main Content -->
            <div id="content">
                <!-- Topbar -->
                <nav class="navbar navbar-expand bg-white topbar mb-4 shadow d-flex justify-content-between sticky-top">
                    <div class="ms-3 d-flex align-items-center justify-content-center">
                        <div class="h4 me-2">
                            <i class="fas fa-user-tie"></i>
                        </div>
                        <div class="fw-bold h4" id="administrador"> Administrador </div>
                    </div>

                    <!-- Topbar Navbar -->
                    <div class="importandoTopBar w-100 d-flex justify-content-end"> </div>
                </nav>

                <!-- Contenido principal -->
                <div class="container-fluid px-4">
                    <!-- Encabezado con título y botones -->
                    <div class="d-flex justify-content-between align-items-center my-4">
                        <h1 class="h3 mb-0 text-gray-800">
                            <i class="fas fa-users-cog me-2 text-warning"></i> Usuarios del Sistema
                        </h1>
                        <div class="d-flex gap-3">
                            <!-- Botones de cambio de vista -->
                            <div class="vista-botones">
                                <button class="btn-vista active" id="vistaTarjetas" title="Vista de tarjetas">
                                    <i class="fas fa-th-large me-2"></i> Tarjetas
                                </button>
                                <button class="btn-vista" id="vistaLista" title="Vista de lista">
                                    <i class="fas fa-list me-2"></i> Lista
                                </button>
                            </div>
                            <button class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#modalNuevoUsuario" id="btnNuevoUsuario">
                                <i class="fas fa-plus-circle me-2"></i> Nuevo Usuario
                            </button>
                            <button class="btn btn-warning" id="btnVolverPanelPrincipal">
                                <i class="fas fa-arrow-right me-2"></i> Volver
                            </button>
                        </div>
                    </div>

                    <!-- Filtros y búsqueda -->
                    <div class="row mb-4">
                        <div class="col-md-4">
                            <div class="input-group">
                                <span class="input-group-text bg-warning">
                                    <i class="fas fa-search text-dark"></i>
                                </span>
                                <input type="text" class="form-control" placeholder="Buscar usuario por nombre o correo..." id="buscadorUsuario">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select" id="filtroRol">
                                <option value="">Todos los roles</option>
                                <!--añadir dinamicamente-->
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select" id="filtroEstado">
                                <option value="">Todos los estados</option>
                                <option value="Activo">Activo</option>
                                <option value="Inactivo">Inactivo</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-outline-secondary w-100" id="btnLimpiarFiltros">
                                <i class="fas fa-eraser me-2"></i> Limpiar
                            </button>
                        </div>
                    </div>

                    <!-- Contenedor de usuarios -->
                    <div id="contenedorUsuarios" class="row g-4">
                        <!-- Aquí se renderizarán los usuarios -->
                    </div>

                    <!-- Paginación -->
                    <div class="mt-4 d-flex justify-content-center align-items-center">
                        <div class="btn-group" role="group">
                            <button type="button" id="btnAnteriorUsuarios" class="btn btn-outline-warning" disabled>
                                <i class="fas fa-chevron-left"></i> Anterior
                            </button>
                            <button type="button" id="btnSiguienteUsuarios" class="btn btn-outline-warning" disabled>
                                Siguiente <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                    <div class="d-flex justify-content-center align-items-center mt-2">
                        <div id="paginaActualUsuarios" class="text-muted">
                            Página 1 de 1
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para agregar/editar una nuevo usuario -->
    <div class="modal fade" id="modalNuevoUsuario" tabindex="-1" aria-labelledby="modalNuevoUsuarioLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalNuevoUsuarioLabel">
                        <i class="fas fa-user-plus me-2"></i> Nuevo Usuario
                    </h5>
                </div>

                <div class="modal-body">
                    <form id="formUsuario">
                        <!-- Datos para inicio de sesion -->
                        <div class="modal-header justify-content-center">
                            <h5 class="modal-title">Datos para iniciar sesión</h5>
                        </div>

                        <div class="row mt-2">
                            <div class="col-3">
                                <!-- Área para mostrar la imagen -->
                                <div class="mb-2 rounded-3 text-center" id="contenedorFotoPerfil">
                                    <div class="d-flex justify-content-center align-items-center bg-light rounded-3 border w-100" style="width: 120px; height: 120px;">
                                        <i class="fas fa-user text-secondary" style="font-size: 3rem;"></i>
                                    </div>
                                </div>

                                <!-- Botón para añadir imagen -->
                                <div class="file-input-wrapper2 mb-1 text-center" id="añadirImagen" style="cursor: pointer;">
                                    <i class="fas fa-plus"></i> Añadir imagen
                                </div>
                                
                                <!-- Input file oculto -->
                                <input type="file" id="campoArchivoFotoPerfil" accept=".png,.jpg,.jpeg" style="display: none;">
                            </div>

                            <div class="col-9">
                                <div class="">
                                    <label for="nombreOCorreoUsuario" class="form-label">Nombre de usuario o correo</label>
                                    <input type="tel" class="form-control" id="nombreOCorreoUsuario" placeholder="Ej: usuario@email.com o usuario123" required>
                                    <label id="errorNombreOCorreoUsuario" class="errorMensaje"></label>
                                </div>
                                <div class="mt-1">
                                    <label for="rolUsuario" class="form-label">Rol</label>
                                    <select class="form-select" id="rolUsuario" required>
                                        <option value="Ninguno">Seleccione...</option>
                                        <!--cargar dinamicamente-->
                                    </select>
                                    <label id="errorRolUsuario" class="errorMensaje"></label>
                                </div>
                                <div class="mt-1 form-check">
                                    <input class="form-check-input" type="checkbox" value="generarContraseña" id="generarContraseña">
                                    <label class="form-check-label" for="generarContraseña"> Generar contraseña </label>
                                </div>
                            </div>
                        </div>

                        <!-- Datos personales -->
                        <!--solo se saca el d-none si el rol es distinto de ninguno, estudiante y profesor-->
                        <div class="mt-4 d-none" id="panelDatosPersonales">
                            <div class="modal-header justify-content-center">
                                <h5 class="modal-title">Datos personales</h5>
                            </div>

                            <div class="row mt-2">
                                <div class="col-4">
                                    <label for="nombreUsuario" class="form-label">Nombre</label>
                                    <input type="text" class="form-control" id="nombreUsuario" placeholder="Ej: Lucio" required>
                                    <label id="errorNombreUsuario" class="errorMensaje"></label>
                                </div>

                                <div class="col-4">
                                    <label for="apellidosUsuario" class="form-label">Apellidos</label>
                                    <input type="text" class="form-control" id="apellidosUsuario" placeholder="Ej: Hernández" required>
                                    <label id="errorApellidosUsuario" class="errorMensaje"></label>
                                </div>

                                <div class="col-4">
                                    <label for="facultadesUsuario" class="form-label">Facultades</label>
                                    <select class="form-select" id="facultadesUsuario">
                                        <!-- Dinamicamente -->
                                    </select>
                                    <label id="errorFacultadesUsuario" class="errorMensaje"></label>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-6">
                                    <label for="correoUsuario" class="form-label">Correo</label>
                                    <input type="text" class="form-control" id="correoUsuario" placeholder="Ej: administrativo@email.com" required>
                                    <label id="errorCorreoUsuario" class="errorMensaje"></label>
                                </div>
                                <div class="col-6">
                                    <label for="telefonoUsuario" class="form-label">Teléfono</label>
                                    <input type="text" class="form-control" id="telefonoUsuario" placeholder="Ej: +240 222 123 456" required>
                                    <label id="errorTelefonoUsuario" class="errorMensaje"></label>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-success" id="btnGuardarUsuario">Guardar Usuario</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de detalles del usuario -->
    <div class="modal fade" id="modalVerUsuario" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-warning">
                    <h5 class="modal-title">Detalles del Usuario</h5>
                </div>
                <div class="modal-body">
                    <div class="text-center mb-3">
                        <img src="" alt="Foto de perfil" class="rounded-circle img-thumbnail" id="detalleFoto" style="width: 120px; height: 120px; object-fit: cover;">
                    </div>
                    <!--agregar el resto de mane dinamica-->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="mb-5"></div>

    <!-- Scroll to Top Button-->
    <a class="scroll-to-top rounded" href="#page-top"> <i class="fas fa-angle-up"></i> </a>

    <!-- Logout Modal-->
    <div class="importandoModalCierreSesion"> </div>
    
    <script src="../../../public/nomodules/jquery/dist/jquery.min.js"></script>
    <script src="../../../public/nomodules/boostrap/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../public/nomodules/startbootstrap-sb-admin-2/js/sb-admin-2.min.js"></script>
    <script type="module" src="../../controlador/c_usuario.js"></script>
</body>
</html>
