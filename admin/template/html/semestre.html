<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Panel del Administrador - Semestres</title>
    <link rel="icon" href="../../../public/img/escudo_AAUCA.jpg">
    <link rel="stylesheet" href="../../../public/nomodules/fontawesome/node_modules/@fortawesome/fontawesome-free/css/all.min.css">
    <link rel="stylesheet" href="../../../public/nomodules/boostrap/node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../../public/nomodules/startbootstrap-sb-admin-2/css/sb-admin-2.min.css">
    <link rel="stylesheet" href="../../../public/nomodules/datatables.net-bs4/css/dataTables.bootstrap4.min.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/general.css">
</head>
<body id="page-top">
    <!-- Page Wrapper -->
    <div id="wrapper" class="toggled">
        <!-- Sidebar -->
        <ul class="navbar-nav sidebar sidebar-dark accordion toggled shadow-lg" id="accordionSidebar">
            <div class="sidebar-brand d-flex align-items-center justify-content-center">
                <div class="sidebar-brand-icon">
                    <i class="fas fa-user-tie"></i>
                </div>
                <div class="sidebar-brand-text"> Administrador </div>
            </div>

            <hr class="sidebar-divider">

            <li class="nav-item">
                <a class="nav-link tableroA">
                    <i class="fas fa-chalkboard"></i> <span> Tablero </span>
                </a>
            </li>

            <hr class="sidebar-divider">

            <li class="nav-item">
                <a class="nav-link usuario">
                    <i class="fas fa-users"></i> <span> Usuarios </span>
                </a>
            </li>
            <li class="nav-item active">
                <a class="nav-link collapsed" data-bs-toggle="collapse" data-bs-target="#collapseTwo" aria-expanded="true" 
                        aria-controls="collapseTwo">
                    <i class="fas fa-list-alt"></i> <span>Currículo</span>
                </a>
                <div id="collapseTwo" class="collapse" aria-labelledby="headingTwo" data-bs-parent="#accordionSidebar">
                    <div class="bg-white py-2 collapse-inner rounded">
                        <a class="collapse-item facultad">Facultad</a>
                        <a class="collapse-item departamento">Departamento</a>
                        <a class="collapse-item carrera">Carrera</a>
                        <a class="collapse-item curso">Curso</a>
                        <a class="collapse-item semestre">Semestre</a>
                        <a class="collapse-item asignatura">Asignatura</a>
                        <a class="collapse-item aula">Aula</a>
                    </div>
                </div>
            </li>
            <li class="nav-item">
                <a class="nav-link noticia">
                    <i class="fas fa-newspaper"></i> <span> Noticias </span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link parametro">
                    <i class="fas fa-cogs"></i> <span> Parámetros del sistema </span>
                </a>
            </li>

            <hr class="sidebar-divider d-none d-md-block">

            <!-- Sidebar Toggler (Sidebar) -->
            <div class="mt-3 text-center d-none d-md-inline">
                <button class="rounded-circle border-0" id="sidebarToggle"></button>
            </div>
        </ul>

        <!-- Content Wrapper -->
        <div id="content-wrapper" class="d-flex flex-column">
            <!-- Main Content -->
            <div id="content">
                <!-- Topbar -->
                <nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow d-flex justify-content-between">

                    <!-- Sidebar Toggle (Topbar) -->
                    <button id="sidebarToggleTop" class="btn btn-link d-md-none mx-3">
                        <i class="fa fa-bars"></i>
                    </button>

                    <!-- Topbar Navbar -->
                    <div class="importandoTopBar w-100 d-flex justify-content-end"> </div>
                </nav>

                <div class="container-fluid">
                    <!-- Page Heading -->
                    <div class="mb-4">
                        <h1 class="h3 mb-0 text-gray-800">
                            <span class="text-warning ms-2"></span> Semestres
                        </h1>
                    </div>

                    <!-- Formulario -->
                    <div class="mb-3 p-3 border border-3 border-black rounded-1">
                        <div class="h4"> Formulario </div>
                        <form id="formSemestre">
                            <div class="row mb-2">
                                <div class="col-6">
                                    <input type="number" min="0" class="form-control" id="numeroSemestre" placeholder="Número de semestre. Ej: 1" required>
                                    <label id="errorNumeroSemestre" class="errorMensaje"></label>
                                </div>
                                <div class="col-6">
                                    <select class="form-select" id="tipoSemestre">
                                        <option value="Ninguno">Seleccione el tipo de semestre ...</option>
                                        <option value="Par">Par</option>
                                        <option value="Impar">Impar</option>                                    
                                    </select>
                                    <label id="errortipoSemestre" class="errorMensaje"></label>
                                </div>
                            </div>
                        </form>
                        <div class="text-end">
                            <button class="btn btn-success btnGuardarSemestre">
                                <span class="icon text-white-50"> <i class="fas fa-save"></i> </span> <span class="text"> Guardar </span>
                            </button>
                        </div>
                    </div>

                    <!-- Tabla de semestres -->
                    <div class="border border-3 border-black mb-5 rounded-1">
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-hover text-center tabla">
                                    <thead>
                                        <tr>
                                            <th width="33.3%">Número</th>
                                            <th width="33.3%">Tipo</th>
                                            <th width="33.3%">Acciones</th>
                                        </tr>
                                    </thead>
                                    <tbody class="tbodyTabla" id="tbodyTablaSemestres"> <!-- Añadir dinámicamente --> 
                                        <tr>
                                            <td class="align-middle">1</td>
                                            <td class="align-middle">Impar</td>
                                            <td class="align-middle">
                                                <div class="d-flex justify-content-center align-items-center gap-1">
                                                    <button class="btn btn-sm btn-outline-info me-1 editar" title="Editar" data-id="idSemestre"> 
                                                        <i class="fas fa-edit"></i>
                                                    </button>
                                                    <button class="btn btn-sm btn-outline-danger me-1 deshabilitar" title="Deshabilitar" data-id="idSemestre"> 
                                                        <i class="fas fa-ban"></i>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scroll to Top Button-->
    <a class="scroll-to-top rounded" href="#page-top"> <i class="fas fa-angle-up"></i> </a>

    <!-- Logout Modal-->
    <div class="importandoModalCierreSesion"> </div>
    
    <script src="../../../public/nomodules/jquery/dist/jquery.min.js"></script>
    <script src="../../../public/nomodules/bootstrap4/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../public/nomodules/boostrap/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../public/nomodules/startbootstrap-sb-admin-2/js/sb-admin-2.min.js"></script>
    <script src="../../../public/nomodules/datatables.net/js/jquery.dataTables.min.js"></script>
    <script src="../../../public/nomodules/datatables.net-bs4/js/dataTables.bootstrap4.min.js"></script>
    <script type="module" src="../../controlador/c_semestre.js"></script>
</body>
</html>
