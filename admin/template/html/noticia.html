<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Panel del Administrador - Noticias</title>
    <link rel="icon" href="../../../public/img/escudo_AAUCA.jpg">
    <link rel="stylesheet" href="../../../public/nomodules/fontawesome/node_modules/@fortawesome/fontawesome-free/css/all.min.css">
    <link rel="stylesheet" href="../../../public/nomodules/boostrap/node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../../public/nomodules/startbootstrap-sb-admin-2/css/sb-admin-2.min.css">
    <link rel="stylesheet" href="../../../public/nomodules/datatables.net-bs4/css/dataTables.bootstrap4.min.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../../../public/template/css/globalModulos.css">
</head>
<body id="page-top">
    <!-- Page Wrapper -->
    <div id="wrapper" class="toggled">
        <!-- Content Wrapper -->
        <div id="content-wrapper" class="d-flex flex-column">
            <!-- Main Content -->
            <div id="content">
                <!-- Topbar -->
                <nav class="navbar navbar-expand bg-white topbar mb-4 shadow d-flex justify-content-between sticky-top">
                    <div class="ms-3 d-flex align-items-center justify-content-center">
                        <div class="h4 me-2">
                            <i class="fas fa-user-tie"></i>
                        </div>
                        <div class="fw-bold h4" id="administrador"> Administrador </div>
                    </div>

                    <!-- Topbar Navbar -->
                    <div class="importandoTopBar w-100 d-flex justify-content-end"> </div>
                </nav>

                <!-- Contenido principal -->
                <div class="container-fluid px-4">
                    <!-- Encabezado con título y botones -->
                    <div class="d-flex justify-content-between align-items-center my-4">
                        <h1 class="h3 mb-0 text-gray-800">
                            <i class="fas fa-users-cog me-2 text-warning"></i> Noticias
                        </h1>
                        <div class="d-flex gap-3">
                            <button class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#modalNuevaNoticia" id="btnNuevaNoticia">
                                <i class="fas fa-plus-circle me-2"></i> Nueva Noticia
                            </button>
                            <button class="btn btn-warning" id="btnVolverPanelPrincipal">
                                <i class="fas fa-arrow-right me-2"></i> Volver
                            </button>
                        </div>
                    </div>

                    <!-- Filtros -->
                    <div class="p-3 mb-3 border border-2 rounded">
                        <div class="d-flex justify-content-end">
                            <div class="w-25">
                                <select class="form-select" id="filtroPorTipo">
                                    <option value="Ninguno">Filtrar por Tipo</option>
                                    <option value="Comunicado">Comunicado</option>
                                    <option value="Interna">Interna</option>
                                    <option value="Departamento">Departamento</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Paginacion de las noticias -->
                    <section>
                        <div class="contenedorTarjetasNoticias mb-4">

                            <!-- Carta de noticias -->
                            <div id="contTarjetaNoticia" class="container">
                                <div class="row" id="tarjetasNoticiasRow"> <!-- Las tarjetas se añadirán aquí dinámicamente --> </div>
                            </div>

                            <!-- Contenedor de paginación -->
                            <div id="contPaginacion" class="container mt-4 d-flex justify-content-center">
                                <!-- La paginación se añadirá aquí dinámicamente -->
                            </div>
                                
                            <!-- Detalles de las noticias -->
                            <div id="contDetallesNoticias" class="container"> <!--añadir dinamicamente--> </div>
                        </div>

                        <!-- Modal -->
                        <div id="modalNoticias" class="modal fade" tabindex="-1" aria-hidden="true">
                            <div class="modal-dialog modal-lg modal-dialog-scrollable">
                                <div class="modal-content">

                                    <div class="modal-header">
                                        <h5 class="modal-title" id="tituloNoticiaDetalle"><!--añadir dinamicamente--></h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                    </div>

                                    <div class="modal-body">
                                        <p id="contenidoNoticiadetalle"> <!--añadir dinamicamente--> </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para agregar/editar una nueva noticia -->
    <div class="modal fade" id="modalNuevaNoticia" tabindex="-1" aria-labelledby="modalNuevaNoticiaLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalNuevaNoticiaLabel">Agregar nueva noticia</h5>
                </div>

                <div class="modal-body">
                    <form id="formNoticia">
                        <div class="row mb-2">
                            <div class="col-9">
                                <label for="asuntoNoticia" class="form-label">Asunto</label>
                                <input type="text" class="form-control" id="asuntoNoticia" name="asunto" placeholder="Ej: Apertura del nuevo año academico" required>
                                <label id="errorAsuntoNoticia" class="errorMensaje"></label>
                            </div>
                            <div class="col-3">
                                <label for="tipoNoticia" class="form-label">Tipo</label>
                                <select class="form-select" id="tipoNoticia" required>
                                    <option name="tipo" value="Ninguno">Seleccione...</option>
                                    <option name="tipo" value="Comunicado">Comunicado</option>
                                    <option name="tipo" value="Interna">Interna</option>
                                    <option name="tipo" value="Departamento">Departamento</option>
                                </select>
                                <label id="errorTipoNoticia" class="errorMensaje"></label>

                                <!--descripcion de cada tipo de noticia-->
                                <div id="descripcionTipo" class="mt-2 small text-muted"></div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-6">
                                <label for="descripcionNoticia" class="form-label">Descripción</label>
                                <textarea class="form-control" id="descripcionNoticia" name="descripcion" rows="4" placeholder="Describa detalladamente la noticia" required></textarea>
                                <label id="errorDescripcionNoticia" class="errorMensaje"></label>
                            </div>

                            <!-- Campo Archivos con botón para eliminar -->
                            <div class="form-group col-6">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <label class="font-weight-bold">
                                        <i class="fas fa-paperclip mr-1"></i> Imagen de la noticia
                                    </label>
                                </div>
                                
                                <!-- Área para arrastrar y soltar -->
                                <div class="file-input-wrapper mb-1" id="fileDropArea">
                                    <i class="fas fa-cloud-upload-alt"></i>
                                    <h6>Arrastra y suelta archivos aquí o cliquea</h6>
                                    <p class="text-muted small">
                                        Formatos permitidos: PNG, JPG, JPEG
                                    </p>
                                </div>
                                
                                <!-- Input file oculto -->
                                <input type="file" id="campoArchivoFoto" name="fotos" multiple accept="image/*">

                                <!-- Contador de archivos -->
                                <div class="alert alert-light border d-flex justify-content-between align-items-center">
                                    <span>
                                        <i class="fas fa-file-alt mr-2"></i>
                                        <span id="contadorArchivos">0 archivos seleccionados</span>
                                    </span>
                                    <button type="button" class="btn btn-sm btn-outline-danger" id="btnLimpiarArchivos">
                                        <i class="fas fa-times mr-1"></i>Limpiar
                                    </button>
                                </div>
                                
                                <!-- Previsualización -->
                                <div class="preview-container mt-3" id="previewContainer">
                                    <h6 class="border-bottom pb-2 mb-3">
                                        <i class="fas fa-images mr-2"></i>
                                        Vista previa de archivos
                                    </h6>
                                    <div id="previewArchivos">
                                        <!-- Aquí se mostrarán los archivos -->
                                    </div>
                                </div>
                                
                                <small class="text-muted">
                                    <i class="fas fa-info-circle"></i> Puedes seleccionar múltiples imágenes
                                </small>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-success" id="btnGuardarNoticia">Guardar Noticia</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para ver detalles de noticias -->
    <div class="modal fade" id="modalVerDetallesNoticia" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body"> 
                    <!-- Tarjeta basica para mostrar los detalles -->
                    <div class="card shadow">
                        <div class="card-header py-3">
                            <h6 class="m-0 font-weight-bold text-primary"> Información de la noticia </h6>
                        </div>

                        <div class="card-body">
                            <!--aqui se muestran todos los datos introducidos en el formulario, dinamicamente-->
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scroll to Top Button-->
    <a class="scroll-to-top rounded" href="#page-top"> <i class="fas fa-angle-up"></i> </a>

    <!-- Logout Modal-->
    <div class="importandoModalCierreSesion"> </div>
    
    <script src="../../../public/nomodules/jquery/dist/jquery.min.js"></script>
    <script src="../../../public/nomodules/bootstrap4/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../public/nomodules/boostrap/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../public/nomodules/startbootstrap-sb-admin-2/js/sb-admin-2.min.js"></script>
    <script src="../../../public/nomodules/datatables.net/js/jquery.dataTables.min.js"></script>
    <script src="../../../public/nomodules/datatables.net-bs4/js/dataTables.bootstrap4.min.js"></script>
    <script type="module" src="../../controlador/c_noticia.js"></script>
</body>
</html>
