<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Panel del Administrador </title>
    <link rel="icon" href="../public/img/escudo_AAUCA.jpg">
    <link rel="stylesheet" href="../public/nomodules/fontawesome/node_modules/@fortawesome/fontawesome-free/css/all.min.css">
    <link rel="stylesheet" href="../public/nomodules/startbootstrap-sb-admin-2/css/sb-admin-2.min.css">
    <link rel="stylesheet" href="../public/nomodules/boostrap/node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../public/template/css/globalModulos.css">
    <link rel="stylesheet" href="template/css/admin.css">
</head>
<body id="page-top">
    <!-- Page Wrapper -->
    <div id="wrapper" class="toggled">
        <!-- Content Wrapper -->
        <div id="content-wrapper" class="d-flex flex-column">
            <!-- Main Content -->
            <div id="content">
                <!-- Topbar -->
                <nav class="navbar navbar-expand bg-white topbar mb-4 shadow d-flex justify-content-between sticky-top">
                    <!--NOmbre del panel-->
                    <div class="ms-3 d-flex align-items-center justify-content-center">
                        <div class="h4 me-2">
                            <i class="fas fa-user-tie"></i>
                        </div>
                        <div class="fw-bold h4" id="administrador"> Administrador </div>
                    </div>

                    <!-- Topbar Navbar -->
                    <div class="importandoTopBar w-100 d-flex justify-content-end"> </div>
                </nav>

                <!-- Page Heading -->
                <div class="container-lg">
                    <div class="my-4">
                        <h1 class="h3 mb-0 text-gray-800">
                            <span class="text-warning ms-2"></span> Bienvedido
                        </h1>
                    </div>

                    <!--texto de bienvenida-->
                    <p>
                        Lorem ipsum dolor sit amet consectetur, adipisicing elit. Vero explicabo, animi dolores minima perferendis aperiam repellendus temporibus 
                        eaque ad repudiandae beatae nihil possimus consequuntur ab voluptatem iure assumenda error atque.
                    </p>

                    <div class="separador"></div>

                    <div class="container-fluid">
                        <div class="container mt-5">
                            <div class="row">
                                <!-- Tarjeta: Gestión de usuarios -->
                                <div class="col-12 col-md-6 col-lg-4 mb-4">
                                    <div class="tarjetaModulo" id="gestionUsuarios">
                                        <div class="icono-modulo">
                                            <i class="fas fa-users"></i>
                                        </div>
                                        <label>Gestión de usuarios</label>
                                    </div>
                                </div>
                                
                                <!-- Tarjeta: Gestión de facultades -->
                                <div class="col-12 col-md-6 col-lg-4 mb-4">
                                    <div class="tarjetaModulo" id="gestionAcademica">
                                        <div class="icono-modulo">
                                            <i class="fas fa-university"></i>
                                        </div>
                                        <label>Gestión académica</label>
                                    </div>
                                </div>
                                
                                <!-- Tarjeta: Gestión de departamentos -->
                                <div class="col-12 col-md-6 col-lg-4 mb-4">
                                    <div class="tarjetaModulo" id="gestionNoticias">
                                        <div class="icono-modulo">
                                            <i class="fas fa-building"></i>
                                        </div>
                                        <label>Gestión de noticias</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scroll to Top Button-->
    <a class="scroll-to-top rounded" href="#page-top"> <i class="fas fa-angle-up"></i> </a>

    <!-- Logout Modal-->
    <div class="importandoModalCierreSesion"> </div>
    
    <script src="../public/nomodules/jquery/dist/jquery.min.js"></script>
    <script src="../public/nomodules/boostrap/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../public/nomodules/startbootstrap-sb-admin-2/js/sb-admin-2.min.js"></script>
    <script type="module" src="controlador/index.js"></script>
</body>
</html>
