<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Panel del Secretario Académico - Evaluaciones</title>
    <link rel="icon" href="../../../public/img/escudo_AAUCA.jpg">
    <link rel="stylesheet" href="../../../public/nomodules/fontawesome/node_modules/@fortawesome/fontawesome-free/css/all.min.css">
    <link rel="stylesheet" href="../../../public/nomodules/boostrap/node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../../public/nomodules/startbootstrap-sb-admin-2/css/sb-admin-2.min.css">
    <link rel="stylesheet" href="../../../public/nomodules/datatables.net-bs4/css/dataTables.bootstrap4.min.css">
    <link rel="stylesheet" href="../css/profesor.css">
    <link rel="stylesheet" href="../css/general.css">
</head>
<body id="page-top">
    <!-- Page Wrapper -->
    <div id="wrapper" class="toggled">
        <!-- Sidebar -->
        <ul class="navbar-nav sidebar sidebar-dark accordion toggled shadow-lg" id="accordionSidebar">
            <div class="sidebar-brand d-flex align-items-center justify-content-center">
                <div class="sidebar-brand-icon">
                    <i class="fas fa-user-tie"></i>
                </div>
                <div class="sidebar-brand-text" id="profesorPanel"> Profesor </div>
            </div>

            <hr class="sidebar-divider">

            <li class="nav-item">
                <a class="nav-link tableroP">
                    <i class="fas fa-chalkboard"></i> <span> Tablero </span>
                </a>
            </li>

            <hr class="sidebar-divider">

            <li class="nav-item">
                <a class="nav-link horario">
                    <i class="fas fa-calendar-alt"></i> <span> Horario </span>
                </a>
            </li>

            <li class="nav-item active">
                <a class="nav-link evaluacion">
                    <i class="fas fa-tasks"></i> <span> Evaluaciones </span>
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link noticia">
                    <i class="fas fa-newspaper"></i> <span> Noticias </span>
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link consulta">
                    <i class="fas fa-comments"></i> <span> Consultas </span>
                </a>
            </li>

            <hr class="sidebar-divider d-none d-md-block">

            <!-- Sidebar Toggler (Sidebar) -->
            <div class="mt-3 text-center d-none d-md-inline">
                <button class="rounded-circle border-0" id="sidebarToggle"></button>
            </div>
        </ul>

        <!-- Content Wrapper -->
        <div id="content-wrapper" class="d-flex flex-column">
            <!-- Main Content -->
            <div id="content">
                <!-- Topbar -->
                <nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow d-flex justify-content-between">

                    <!-- Sidebar Toggle (Topbar) -->
                    <button id="sidebarToggleTop" class="btn btn-link d-md-none mx-3">
                        <i class="fa fa-bars"></i>
                    </button>

                    <!-- Topbar Navbar -->
                    <div class="importandoTopBar w-100 d-flex justify-content-end"> </div>
                </nav>

                <div class="container-fluid">
                    <!-- Page Heading -->
                    <div class="mb-4">
                        <h1 class="h3 mb-0 text-gray-800">
                            <span class="text-warning ms-2"></span> Evaluaciones
                        </h1>
                    </div>

                    <!--PARTE DE LA EVALUACIONES-->
                    <div>
                        <div class="mb-3 p-3 border border-3 border-black rounded-1">
                            <div class="filter-group">
                                <div class="combo-input-wrapper">
                                    <input type="text" id="comboAsignaturaEvaluacion" class="form-control" placeholder="Buscar o seleccionar asignatura">
                                    <div class="dropdown-options" id="opcionAsignaturaEvaluacion"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Tabla de evaluacion -->
                        <div class="border border-3 border-black mb-5 rounded-1">
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-hover text-center tabla" id="tablaEvaluaciones">
                                        <thead>
                                            <tr>
                                                <th width="80%">Estudiante</th>
                                                <th width="20%">Acciones</th>
                                            </tr>
                                        </thead>
                                        <tbody class="tbodyTabla" id="tbodyTablaEvaluaciones"> <!-- Añadir dinámicamente --> 
                                            <tr>
                                                <td class="align-middle">Jose Luis Mangue</td>
                                                <td class="align-middle">
                                                    <div class="d-flex justify-content-center align-items-center gap-1">
                                                        <button class="btn btn-sm btn-outline-info me-1 verNotas" data-bs-toggle="modal" data-bs-target="#modalVerNotas" 
                                                            title="Ver notas" data-id="idEvaluacion"> <i class="fas fa-eye"></i>
                                                        </button>
                                                        <button class="btn btn-sm btn-outline-warning me-1 evaluar" data-bs-toggle="modal" data-bs-target="#modalNuevaEvaluacion" 
                                                            title="Evaluar" data-id="idEvaluacion"> <i class="fas fa-edit"></i>
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para agregar/editar un nuevo pago -->
    <div class="modal fade" id="modalNuevaEvaluacion" tabindex="-1" aria-labelledby="modalNuevaEvaluacionLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-sm">
            <div class="modal-content">
                <div class="modal-header justify-content-between align-items-center">
                    <h5 class="modal-title" id="modalNuevaEvaluacionLabel">Agregar nueva evaluación</h5>
                </div>

                <div class="modal-body">
                    <form id="formEvaluacion">
                        <div class="row">
                            <div class="col-6">
                                <label for="estudianteEvaluacion" class="form-label">Estudiante</label>
                                <input type="text" class="form-control" id="estudianteEvaluacion" placeholder="Se añade por defecto" required>
                                <label id="errorestudianteEvaluacion" class="errorMensaje"></label>
                            </div>
                            <div class="col-6">
                                <label for="asignaturaEvaluacion" class="form-label">Asignatura</label>
                                <input type="text" class="form-control" id="asignaturaEvaluacion" placeholder="Se añade por defecto" required>
                                <label id="errorasignaturaEvaluacion" class="errorMensaje"></label>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-4">
                                <label for="tipoEvaluacionEvaluacion" class="form-label">Tipo de evaluación</label>
                                <select class="form-select" id="tipoEvaluacionEvaluacion" required>
                                    <option value="Ninguno">Seleccione...</option>
                                    <option value="Parcial">Parcial</option>
                                    <option value="Asistencia">Asistencia</option>
                                    <option value="TP">TP</option>
                                    <option value="Ordinario">Ordinario</option>
                                    <option value="Extraordinario">Extraordinario</option>
                                </select>
                                <label id="errortipoEvaluacionEvaluacion" class="errorMensaje"></label>
                            </div>
                            <div class="col-4">
                                <label for="numeroEvaluacionEvaluacion" class="form-label">Número de evaluación</label>
                                <input type="number" min="0" max="10" class="form-control" id="numeroEvaluacionEvaluacion" placeholder="Ej: 1" required>
                                <label id="errornumeroEvaluacionEvaluacion" class="errorMensaje"></label>
                            </div>
                            <div class="col-4">
                                <label for="notaEvaluacion" class="form-label">Nota</label>
                                <input type="number" min="0" step="any" class="form-control" id="notaEvaluacion" placeholder="Ej: 10" required>
                                <label id="errornotaEvaluacion" class="errorMensaje"></label>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary cancelar" type="button" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-success" id="btnGuardarPago">Guardar Pago</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para ver detalles de matricula -->
    <div class="modal fade" id="modalVerNotas" tabindex="-1" aria-labelledby="modalVerNotasLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-sm">
            <div class="modal-content">
                <div class="modal-body"> 
                    <div class="card shadow">
                        <div class="card-header py-3">
                            <h6 class="m-0 font-weight-bold text-primary"> Historial de notas de la asignatura </h6>
                        </div>

                        <div class="card-body">
                            <!--añadir de forma dinañica-->
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary cancelar" type="button" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scroll to Top Button-->
    <a class="scroll-to-top rounded" href="#page-top"> <i class="fas fa-angle-up"></i> </a>

    <!-- Logout Modal-->
    <div class="importandoModalCierreSesion"> </div>
    
    <script src="../../../public/nomodules/jquery/dist/jquery.min.js"></script>
    <script src="../../../public/nomodules/bootstrap4/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../public/nomodules/boostrap/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../public/nomodules/startbootstrap-sb-admin-2/js/sb-admin-2.min.js"></script>
    <script src="../../../public/nomodules/datatables.net/js/jquery.dataTables.min.js"></script>
    <script src="../../../public/nomodules/datatables.net-bs4/js/dataTables.bootstrap4.min.js"></script>
    <script type="module" src="../../controlador/c_evaluacion.js"></script>
</body>
</html>
